# AncientCityPro configuration

database:
  # 'sqlite' (default, zero-setup) or 'mysql'
  type: sqlite
  # MySQL settings (ignored when type: sqlite)
  mysql:
    host: localhost
    port: 3306
    database: ancientcitypro
    username: root
    password: ""

discovery:
  # Auto-register naturally-generated Ancient Cities as they load.
  enabled: true
  # Clamp the registered region's vertical bounds to the structure's own
  # Y-extent (recommended). When false, uses the raw structure bounding box.
  clamp-to-structure-y: true
  # Run a sweep over already-loaded chunks on plugin enable so cities resident
  # at startup are caught without waiting for a ChunkLoadEvent.
  startup-sweep: true

loot:
  # Per-player container loot (Lootr-style). Each player gets their own private
  # copy of a city container's contents; copies refresh on city reset. Only
  # containers inside the actual generated structure are treated as city loot —
  # player-placed chests keep vanilla behaviour.
  enabled: true
  # Per-city loot refresh window, in hours. The first player to loot a city with
  # no active (or an expired) cycle starts a fresh 'refresh-hours' window for THAT
  # city; during it, every player still gets their own private copy. When it
  # elapses, the next looter triggers a refresh (all copies cleared) and a new
  # window begins. Per-city + lazy, so cities never all refresh at once. 0 = never
  # refresh (per-player copies persist indefinitely).
  refresh-hours: 12

protection:
  # Palette-aware griefing protection: only Ancient City *structure* blocks
  # (worked deepslate, sculk, soul fixtures, wool/carpet, chains/lanterns,
  # containers) are protected — natural deepslate, ores, and caves stay mineable.
  enabled: true
  # Blocks to expand the protected region beyond the structure's bounding box, to
  # cover edge decoration vanilla places a few blocks outside it. ~8 is plenty.
  bounds-padding: 8
  # Deny placing structure-palette blocks inside the protected region.
  block-place: true
  # Protect structure blocks from creeper/TNT/other explosions.
  block-explosions: true
  # Show an action-bar message when a break/place is denied.
  notify-denied: true

debug:
  verbose-logging: false
