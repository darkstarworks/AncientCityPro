# AncientCityPro configuration

database:
  # 'sqlite' (default, zero-setup) or 'mysql'
  type: sqlite
  # MySQL settings (ignored when type: sqlite)
  mysql:
    host: localhost
    port: 3306
    database: ancientcitypro
    username: root
    password: ""

discovery:
  # Auto-register naturally-generated Ancient Cities as they load.
  enabled: true
  # Clamp the registered region's vertical bounds to the structure's own
  # Y-extent (recommended). When false, uses the raw structure bounding box.
  clamp-to-structure-y: true
  # Run a sweep over already-loaded chunks on plugin enable so cities resident
  # at startup are caught without waiting for a ChunkLoadEvent.
  startup-sweep: true

loot:
  # Per-player container loot (Lootr-style). Each player gets their own private
  # copy of a city container's contents; copies refresh on city reset. Only
  # containers inside the actual generated structure are treated as city loot —
  # player-placed chests keep vanilla behaviour.
  enabled: true

debug:
  verbose-logging: false
